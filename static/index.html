<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenAgent</title>
    <style>
        :root {
            /* 工业极简冷峻风 - 调整色板，消除紫色与庸俗阴影，注重空间感与材质感 */
            --charcoal-900: #121417;
            --charcoal-800: #1a1d21;
            --charcoal-700: #2c3138;
            --slate-400: #8c939d;
            --slate-300: #a1a8b3;
            --bg-canvas: #f0efe9;
            --bg-surface: #f8f8f6;
            --bg-panel: #ffffff;
            --border-hard: #dad8cf;
            --border-soft: #e8e7e1;

            --accent-color: #121417;
            --danger-color: #e03131;
            --danger-bg: #fff5f5;

            --transition-snap: all 0.2s cubic-bezier(0.2, 0, 0, 1);
            --transition-smooth: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);

            --radius-sm: 4px;
            --radius-md: 8px;
            --radius-lg: 12px;

            --font-display: 'Syne', sans-serif;
            --font-body: 'Schibsted Grotesk', -apple-system, sans-serif;
            --font-mono: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        ::selection {
            background: var(--charcoal-900);
            color: var(--bg-canvas);
        }

        /* 噪点纹理叠加，提升前端界面的高级质感 */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.035;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        body {
            font-family: var(--font-body);
            background: var(--bg-canvas);
            color: var(--charcoal-900);
            height: 100vh;
            display: flex;
            overflow: hidden;
            font-size: 14px;
            -webkit-font-smoothing: antialiased;
        }

        /* 自定义硬朗极简滚动条 */
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-hard);
            border-radius: 0;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--slate-400);
        }

        /* ----- 侧边栏 (极简紧凑排版) ----- */
        .sidebar {
            width: 260px;
            background: var(--bg-surface);
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-hard);
            position: relative;
            z-index: 10;
        }

        .sidebar-header {
            padding: 24px 20px;
            border-bottom: 1px solid var(--border-hard);
            background: var(--bg-panel);
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: var(--charcoal-900);
            color: var(--bg-canvas);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 18px;
            border-radius: var(--radius-sm);
        }

        .logo-text {
            font-family: var(--font-display);
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.5px;
            text-transform: uppercase;
        }

        .new-chat-btn {
            width: 100%;
            padding: 12px 16px;
            background: transparent;
            color: var(--charcoal-900);
            border: 1px solid var(--charcoal-900);
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 600;
            font-family: var(--font-display);
            cursor: pointer;
            transition: var(--transition-snap);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .new-chat-btn:hover {
            background: var(--charcoal-900);
            color: var(--bg-canvas);
        }

        .sidebar-title {
            color: var(--slate-400);
            font-size: 10px;
            font-weight: 700;
            font-family: var(--font-display);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin: 20px 20px 10px;
        }

        .conversation-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 12px 16px;
        }

        /* 历史记录，扁平紧凑 */
        .conversation-item {
            padding: 8px 10px;
            margin-bottom: 2px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: var(--transition-snap);
            color: var(--charcoal-700);
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid transparent;
        }

        .conversation-item:hover {
            background: rgba(0, 0, 0, 0.03);
        }

        .conversation-item.active {
            background: var(--bg-panel);
            color: var(--charcoal-900);
            font-weight: 600;
            border-color: var(--border-soft);
            box-shadow: 2px 2px 0 rgba(0, 0, 0, 0.02);
        }

        .conversation-item-icon {
            font-size: 14px;
            opacity: 0.6;
        }

        .conversation-item-text {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .delete-btn {
            opacity: 0;
            padding: 4px;
            background: transparent;
            border: none;
            cursor: pointer;
            color: var(--slate-300);
            transition: var(--transition-snap);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-sm);
        }

        .conversation-item:hover .delete-btn {
            opacity: 0.5;
        }

        .conversation-item .delete-btn:hover {
            opacity: 1;
            color: var(--danger-color);
            background: var(--danger-bg);
        }

        .delete-btn svg {
            width: 14px;
            height: 14px;
        }

        #conversationList:empty::after {
            content: 'NO HISTORY';
            display: block;
            text-align: center;
            color: var(--slate-400);
            font-family: var(--font-display);
            font-size: 11px;
            padding: 40px 16px;
            letter-spacing: 1px;
        }

        /* ----- 主区域 ----- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            background: var(--bg-panel);
        }

        .header {
            background: var(--bg-panel);
            padding: 16px 32px;
            border-bottom: 1px solid var(--border-hard);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-nav-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: transparent;
            border: 1px solid transparent;
            font-size: 12px;
            font-weight: 600;
            color: var(--slate-400);
            text-decoration: none;
            cursor: pointer;
            transition: var(--transition-snap);
            font-family: var(--font-display);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .header-nav-btn:hover {
            color: var(--charcoal-900);
            border-color: var(--border-hard);
            background: var(--bg-surface);
        }

        .header-nav-btn svg {
            width: 14px;
            height: 14px;
        }

        .header-conversation-info {
            font-size: 11px;
            color: var(--slate-400);
            font-family: var(--font-mono);
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 32px 48px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            scroll-behavior: smooth;
        }

        /* ----- 消息区块设计 ----- */

        .message-time {
            font-size: 10px;
            font-family: var(--font-mono);
            color: var(--slate-300);
            margin-top: 6px;
            text-align: right;
        }

        /* 用户消息 */
        .user-message {
            align-self: flex-end;
            max-width: 70%;
            background: var(--charcoal-900);
            color: var(--bg-panel);
            padding: 16px 20px;
            border-radius: var(--radius-sm);
            font-size: 15px;
            line-height: 1.6;
            box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.05);
            animation: slideInRight 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .user-message .message-time {
            color: rgba(255, 255, 255, 0.4);
        }

        /* 助手消息容器 */
        .assistant-message {
            align-self: flex-start;
            max-width: 80%;
            display: flex;
            flex-direction: column;
            gap: 8px;
            animation: slideInLeft 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* 可折叠元素的共用样式 */
        details.think-details, details.tool-details {
            background: var(--bg-surface);
            border: 1px solid var(--border-hard);
            border-radius: var(--radius-sm);
            overflow: hidden;
        }

        details > summary {
            list-style: none;
            padding: 10px 14px;
            font-size: 12px;
            font-weight: 600;
            font-family: var(--font-display);
            color: var(--charcoal-700);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            user-select: none;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: rgba(0, 0, 0, 0.01);
            transition: var(--transition-snap);
        }

        details > summary::-webkit-details-marker {
            display: none;
        }

        details > summary:hover {
            background: rgba(0, 0, 0, 0.03);
        }

        details .fold-icon {
            transition: transform 0.2s ease;
            transform: rotate(-90deg);
            color: var(--slate-400);
        }

        details[open] .fold-icon {
            transform: rotate(0deg);
        }

        details[open] > summary {
            border-bottom: 1px solid var(--border-hard);
        }

        details .content {
            padding: 14px;
            font-size: 13.5px;
            line-height: 1.6;
            color: var(--charcoal-800);
            border-left: 2px solid transparent;
        }

        /* 思考过程专属样式 (虚线边框) */
        details.think-details .content {
            border-left-color: var(--slate-300);
            border-left-style: dashed;
            color: var(--slate-400);
            background: var(--bg-canvas);
        }

        /* 工具调用专属样式 (等宽字体) */
        details.tool-details .content {
            border-left-color: var(--charcoal-900);
            border-left-style: solid;
            font-family: var(--font-mono);
            font-size: 12px;
            background: var(--bg-canvas);
            overflow-x: auto;
        }

        /* 最终回复内容 */
        .reply-content {
            font-size: 15px;
            line-height: 1.7;
            color: var(--charcoal-900);
            padding: 4px 0;
        }

        /* Markdown 基本样式适配 */
        .reply-content p, .content p {
            margin-bottom: 0.8em;
        }

        .reply-content p:last-child, .content p:last-child {
            margin-bottom: 0;
        }

        .reply-content pre, .content pre {
            background: var(--charcoal-900);
            color: var(--bg-canvas);
            padding: 16px;
            border-radius: var(--radius-sm);
            overflow-x: auto;
            font-family: var(--font-mono);
            font-size: 13px;
            margin: 12px 0;
        }

        .reply-content code, .content code {
            font-family: var(--font-mono);
            background: rgba(0, 0, 0, 0.05);
            padding: 2px 6px;
            border-radius: 2px;
            font-size: 0.9em;
        }

        .reply-content pre code {
            background: transparent;
            padding: 0;
        }

        /* 流式输出光标 */
        .streaming-active::after {
            content: '';
            display: inline-block;
            width: 8px;
            height: 16px;
            background: var(--charcoal-900);
            vertical-align: text-bottom;
            margin-left: 4px;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* ----- 底部输入区 ----- */
        .input-wrapper {
            background: var(--bg-panel);
            padding: 20px 48px 32px;
            border-top: 1px solid var(--border-hard);
            position: relative;
        }

        .input-wrapper::before {
            content: '';
            position: absolute;
            top: -30px;
            left: 0;
            right: 0;
            height: 30px;
            background: linear-gradient(to top, var(--bg-panel), transparent);
            pointer-events: none;
        }

        .workspace-btn {
            padding: 6px 12px;
            background: transparent;
            border: 1px solid var(--border-hard);
            border-radius: var(--radius-sm);
            font-size: 11px;
            font-family: var(--font-mono);
            color: var(--slate-400);
            cursor: pointer;
            transition: var(--transition-snap);
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        .workspace-btn:hover {
            border-color: var(--charcoal-900);
            color: var(--charcoal-900);
        }

        .workspace-btn svg {
            width: 12px;
            height: 12px;
        }

        .workspace-path {
            max-width: 400px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .input-container {
            display: flex;
            gap: 12px;
            align-items: flex-end;
            background: var(--bg-surface);
            padding: 8px;
            border: 1px solid var(--border-hard);
            border-radius: var(--radius-sm);
            transition: var(--transition-snap);
        }

        .input-container:focus-within {
            border-color: var(--charcoal-900);
            box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.05);
        }

        .message-input {
            flex: 1;
            padding: 10px 12px;
            border: none;
            background: transparent;
            font-size: 15px;
            font-family: var(--font-body);
            color: var(--charcoal-900);
            outline: none;
            resize: none;
            min-height: 44px;
            max-height: 160px;
            line-height: 1.5;
        }

        .message-input::placeholder {
            color: var(--slate-300);
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 700;
            font-family: var(--font-display);
            cursor: pointer;
            transition: var(--transition-snap);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            height: 44px;
        }

        .send-button {
            background: var(--charcoal-900);
            color: var(--bg-panel);
        }

        .send-button:hover:not(:disabled) {
            background: var(--charcoal-700);
            transform: translateY(-1px);
        }

        .send-button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .interrupt-button {
            background: var(--danger-color);
            color: #fff;
        }

        .interrupt-button:hover {
            background: #c92a2a;
        }

        /* 空状态 */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            padding: 40px;
            animation: fadeIn 0.5s ease-out;
        }

        .empty-state-icon {
            width: 64px;
            height: 64px;
            border: 1px solid var(--charcoal-900);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 24px;
            transform: rotate(45deg);
        }

        .empty-state-icon span {
            transform: rotate(-45deg);
        }

        .empty-state-title {
            font-family: var(--font-display);
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: -0.5px;
        }

        .empty-state-text {
            color: var(--slate-400);
            max-width: 400px;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .empty-state-hint {
            padding: 12px 16px;
            border: 1px dashed var(--slate-300);
            font-size: 12px;
            color: var(--slate-400);
            font-family: var(--font-mono);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        /* 隐藏原打字指示器，流式已有光标 */
        .typing-indicator {
            display: none;
        }

        /* Modal 通用样式精简 */
        .dir-modal-overlay, .confirm-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(240, 239, 233, 0.85); /* 半透明背景融入整体 */
            backdrop-filter: blur(8px);
            z-index: 2000;
        }

        .dir-modal, .confirm-dialog {
            background: var(--bg-panel);
            border: 1px solid var(--charcoal-900);
            box-shadow: 8px 8px 0 rgba(0, 0, 0, 0.05);
            border-radius: 0;
            margin: 10vh auto;
            display: flex;
            flex-direction: column;
            animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .dir-modal {
            width: 90%;
            max-width: 600px;
            height: 70vh;
        }

        .confirm-dialog {
            max-width: 360px;
            padding: 32px;
            align-items: center;
            text-align: center;
            margin-top: 30vh;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .dir-modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-hard);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: var(--font-display);
            text-transform: uppercase;
        }

        .dir-modal-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .dir-item {
            padding: 10px 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 13px;
            font-family: var(--font-mono);
            border-bottom: 1px dashed var(--border-soft);
            transition: var(--transition-snap);
        }

        .dir-item:hover {
            background: var(--bg-surface);
            padding-left: 20px;
        }

        .dir-modal-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--border-hard);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        .confirm-title {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 18px;
            margin-bottom: 12px;
        }

        .confirm-text {
            font-size: 14px;
            color: var(--slate-400);
            margin-bottom: 24px;
        }

        .confirm-buttons {
            display: flex;
            gap: 12px;
            width: 100%;
        }

        .confirm-btn {
            flex: 1;
            padding: 12px;
            border: none;
            font-size: 13px;
            font-weight: 700;
            font-family: var(--font-display);
            text-transform: uppercase;
            cursor: pointer;
        }

        .confirm-btn.cancel {
            background: transparent;
            border: 1px solid var(--border-hard);
            color: var(--charcoal-900);
        }

        .confirm-btn.danger {
            background: var(--danger-color);
            color: white;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">
        <div class="sidebar-logo">
            <div class="logo-icon">A</div>
            <span class="logo-text">OpenAgent</span>
        </div>
        <button class="new-chat-btn" onclick="startNewChat()">
            + New Dialog
        </button>
    </div>
    <div class="sidebar-title">History Logs</div>
    <div class="conversation-list" id="conversationList"></div>
</div>

<div class="main-content">
    <div class="header">
        <div class="header-left">
            <a class="header-nav-btn" href="/static/cron.html">Cron</a>
            <a class="header-nav-btn" href="/static/mcp.html">MCP</a>
            <a class="header-nav-btn" href="/static/skill.html">Skills</a>
            <a class="header-nav-btn" href="/static/config.html">Config</a>
        </div>
        <span class="header-conversation-info" id="conversationInfo"></span>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="empty-state" id="emptyState">
            <div class="empty-state-icon"><span>✦</span></div>
            <div class="empty-state-title">Initialize Process</div>
            <div class="empty-state-text">Start a new conversation or select an existing trace from the sidebar to continue.</div>
            <div class="empty-state-hint">Press Enter to execute / Shift+Enter for newline</div>
        </div>
    </div>

    <div class="input-wrapper">
        <button class="workspace-btn" id="workspaceBtn" onclick="selectWorkspace()" title="Set Directory Context">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
            </svg>
            <span>CWD:</span>
            <span class="workspace-path" id="workspaceDisplay">UNSET</span>
        </button>
        <div class="input-container">
            <textarea class="message-input" id="messageInput" placeholder="Enter instructions..." maxlength="2000" disabled rows="1"></textarea>
            <button class="interrupt-button btn" id="interruptButton" onclick="interruptConversation()" style="display: none;">Halt</button>
            <button class="send-button btn" id="sendButton" onclick="sendMessage()" disabled>Execute</button>
        </div>
    </div>
</div>

<div id="dirModalOverlay" class="dir-modal-overlay">
    <div class="dir-modal">
        <div class="dir-modal-header">
            <h3 class="confirm-title" style="margin-bottom:0">Workspace Context</h3>
            <button class="delete-btn" onclick="closeDirModal()" style="opacity:1; color:var(--charcoal-900)">✕</button>
        </div>
        <div style="padding: 12px 24px; border-bottom: 1px solid var(--border-hard); display: flex; gap: 8px; background: var(--bg-surface);">
            <input type="text" id="manualPathInput" style="flex:1; padding: 8px 12px; border: 1px solid var(--border-hard); background: transparent; font-family: var(--font-mono); font-size: 12px; outline: none;" placeholder="Input path...">
            <button class="btn send-button" style="height: auto; padding: 8px 16px;" onclick="handleManualJump()">GO</button>
        </div>
        <div style="padding: 6px 24px; font-family: var(--font-mono); font-size: 11px; color: var(--slate-400); background: var(--bg-surface); border-bottom: 1px solid var(--border-hard);" id="currentPathDisplay"></div>

        <div id="dirList" class="dir-modal-content"></div>
        <div class="dir-modal-footer">
            <button class="confirm-btn cancel" onclick="closeDirModal()">Abort</button>
            <button class="confirm-btn send-button" onclick="confirmDirSelection()">Confirm Path</button>
        </div>
    </div>
</div>

<script>
    const chatContainer = document.getElementById('chatContainer');
    const messageInput = document.getElementById('messageInput');
    const sendButton = document.getElementById('sendButton');
    const interruptButton = document.getElementById('interruptButton');
    const conversationList = document.getElementById('conversationList');
    const conversationInfo = document.getElementById('conversationInfo');
    const emptyState = document.getElementById('emptyState');
    const manualPathInput = document.getElementById('manualPathInput');

    let currentConversationId = null;
    let isTyping = false;
    let currentEventSource = null;
    let currentWorkdir = '';
    let tempSelectedPath = "";

    // UI状态变量
    let currentWrapper = null;
    let currentTargetNode = null;

    // SVG Icons
    const FOLD_SVG = `<svg viewBox="0 0 24 24" class="fold-icon" width="14" height="14" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="square" stroke-linejoin="miter"><polyline points="6 9 12 15 18 9"></polyline></svg>`;

    document.addEventListener('DOMContentLoaded', () => {
        messageInput.addEventListener('input', autoResize);
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        manualPathInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleManualJump();
        });
        loadConversationList();
        startNewChat();
    });

    async function loadDirList(path) {
        const dirListContainer = document.getElementById('dirList');
        const pathDisplay = document.getElementById('currentPathDisplay');
        dirListContainer.innerHTML = '<div style="padding:20px; text-align:center; font-family:var(--font-mono); font-size:12px; color:var(--slate-400)">LOADING...</div>';
        try {
            const response = await fetch(`/dir/list?path=${encodeURIComponent(path)}`);
            const data = await response.json();
            tempSelectedPath = data.current_path;
            pathDisplay.textContent = `> ${data.current_path}`;
            dirListContainer.innerHTML = "";
            if (data.parent_path) {
                dirListContainer.appendChild(createDirItem(".. (UP LEVEL)", data.parent_path));
            }
            data.directories.forEach(dir => {
                dirListContainer.appendChild(createDirItem(dir.name, dir.path));
            });
        } catch (e) {
            dirListContainer.innerHTML = '<div style="padding:20px; color:var(--danger-color)">ERR: CONNECTION FAILED</div>';
        }
    }

    async function initDefaultWorkspace() {
        try {
            const response = await fetch(`/dir/list?path=`);
            const data = await response.json();
            if (data.current_path) updateWorkspaceUI(data.current_path);
        } catch (e) {
        }
    }

    async function selectWorkspace() {
        document.getElementById('dirModalOverlay').style.display = 'block';
        await loadDirList(currentWorkdir || "");
    }

    function handleManualJump() {
        const targetPath = manualPathInput.value.trim();
        if (targetPath) loadDirList(targetPath);
    }

    function createDirItem(name, path) {
        const div = document.createElement('div');
        div.className = 'dir-item';
        div.innerHTML = `<span>[DIR]</span><span>${name}</span>`;
        div.onclick = () => loadDirList(path);
        return div;
    }

    function confirmDirSelection() {
        updateWorkspaceUI(tempSelectedPath);
        closeDirModal();
    }

    function updateWorkspaceUI(path) {
        currentWorkdir = path;
        const display = document.getElementById('workspaceDisplay');
        display.textContent = path;
        display.title = path;
    }

    function closeDirModal() {
        document.getElementById('dirModalOverlay').style.display = 'none';
    }

    function autoResize() {
        messageInput.style.height = 'auto';
        messageInput.style.height = Math.min(messageInput.scrollHeight, 160) + 'px';
    }

    async function loadConversationList() {
        try {
            const response = await fetch('/conversation/list');
            const conversations = await response.json();
            conversationList.innerHTML = '';
            conversations.forEach(conversation => {
                const item = document.createElement('div');
                item.className = 'conversation-item';
                item.dataset.id = conversation.id;
                item.innerHTML = `
                    <span class="conversation-item-icon">▪</span>
                    <span class="conversation-item-text">${conversation.title}</span>
                    <button class="delete-btn" onclick="event.stopPropagation(); confirmDeleteConversation('${conversation.id}')" title="Delete">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                `;
                item.onclick = () => loadConversation(conversation.id);
                conversationList.appendChild(item);
            });
            // Update active state if exists
            if (currentConversationId) {
                const items = conversationList.querySelectorAll('.conversation-item');
                items.forEach(item => item.classList.toggle('active', String(item.dataset.id) === String(currentConversationId)));
            }
        } catch (e) {
        }
    }

    async function loadConversation(conversationId) {
        currentConversationId = conversationId;
        try {
            const response = await fetch(`/conversation/${conversationId}`);
            const data = await response.json();
            updateWorkspaceUI(data.work_dir);
            chatContainer.innerHTML = '';
            emptyState.style.display = 'none';

            if (data.messages && data.messages.length > 0) {
                const messages = processMessages(data.messages);
                messages.forEach(msg => {
                    if (msg.role === 'user') {
                        addUserMessage(msg.content, msg.time);
                    } else if (msg.role === 'assistant') {
                        addAssistantGroup(msg.content, msg.time);
                    }
                });
            } else {
                chatContainer.appendChild(emptyState);
                emptyState.style.display = 'flex';
            }

            messageInput.value = '';
            autoResize();
            enableInput();
            conversationInfo.textContent = `ID: ${conversationId}`;

            const items = conversationList.querySelectorAll('.conversation-item');
            items.forEach(item => item.classList.toggle('active', String(item.dataset.id) === String(conversationId)));
            chatContainer.scrollTop = chatContainer.scrollHeight;
        } catch (e) {
            addUserMessage('ERR: Failed to load conversation', getCurrentTime());
        }
    }

    /**
     * 处理消息数组：
     * 1. 如果 'user' 消息的 content 为列表（数组），将其 role 改为 'assistant'
     * 2. 合并相邻的 'assistant' 消息的 content
     *
     * @param {Array} messages - 原始消息对象数组
     * @returns {Array} - 处理后的消息数组
     */
    function processMessages(messages) {
        // 深拷贝以避免修改原始数据
        const msgs = JSON.parse(JSON.stringify(messages));

        // 第一步：修改特定 user 的 role 为 assistant
        msgs.forEach(msg => {
            if (msg.role === 'user' && Array.isArray(msg.content)) {
                msg.role = 'assistant';
            }
        });

        // 第二步：合并相邻的 assistant 消息
        const mergedMessages = [];

        for (const msg of msgs) {
            if (mergedMessages.length === 0) {
                mergedMessages.push(msg);
                continue;
            }

            const lastMsg = mergedMessages[mergedMessages.length - 1];

            // 判断是否为相邻的 assistant 消息
            if (lastMsg.role === 'assistant' && msg.role === 'assistant') {
                // 两者 content 都是数组，直接拼接
                lastMsg.content = lastMsg.content.concat(msg.content);
            } else {
                // 角色不同，直接压入结果数组
                mergedMessages.push(msg);
            }
        }

        return mergedMessages;
    }

    async function deleteConversation(conversationId) {
        closeConfirmDialog();
        try {
            await fetch(`/conversation/${conversationId}`, {method: 'DELETE'});
            if (String(currentConversationId) === String(conversationId)) startNewChat();
            await loadConversationList();
        } catch (e) {
        }
    }

    function confirmDeleteConversation(conversationId) {
        const overlay = document.createElement('div');
        overlay.className = 'confirm-overlay';
        overlay.style.display = 'flex';
        overlay.innerHTML = `
            <div class="confirm-dialog">
                <div class="confirm-title">PURGE RECORD</div>
                <div class="confirm-text">Are you sure you want to delete this conversation? This action is irreversible.</div>
                <div class="confirm-buttons">
                    <button class="confirm-btn cancel" onclick="closeConfirmDialog()">Abort</button>
                    <button class="confirm-btn danger" onclick="deleteConversation('${conversationId}')">Purge</button>
                </div>
            </div>
        `;
        document.body.appendChild(overlay)
        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) closeConfirmDialog();
        });
    }

    function closeConfirmDialog() {
        const overlay = document.querySelector('.confirm-overlay');
        if (overlay) overlay.remove();
    }

    function startNewChat() {
        currentConversationId = null;
        chatContainer.innerHTML = '';
        chatContainer.appendChild(emptyState);
        emptyState.style.display = 'flex';
        messageInput.value = '';
        autoResize();
        enableInput();
        conversationInfo.textContent = 'NEW TRACE';
        loadConversationList().then(() => {
            const items = conversationList.querySelectorAll('.conversation-item');
            items.forEach(item => item.classList.remove('active'));
        });
        initDefaultWorkspace();
    }

    function enableInput() {
        messageInput.disabled = false;
        sendButton.disabled = false;
        messageInput.focus();
    }

    function getCurrentTime() {
        const now = new Date();
        return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')} ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
    }

    function scrollToBottomIfAtBottom() {
        if (chatContainer.scrollHeight - chatContainer.scrollTop - chatContainer.clientHeight < 100) {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
    }

    // 简单 Markdown 转 HTML
    function formatMarkdown(text) {
        const div = document.createElement('div');
        div.textContent = text;
        let result = div.innerHTML;
        result = result.replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
        result = result.replace(/`([^`]+)`/g, '<code>$1</code>');
        result = result.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
        result = result.replace(/\*([^*]+)\*/g, '<em>$1</em>');
        result = result.replace(/\n/g, '<br>');
        return result;
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function addUserMessage(content, time) {
        emptyState.style.display = 'none';
        const div = document.createElement('div');
        div.className = 'user-message';
        div.innerHTML = `${formatMarkdown(content.trim())}<div class="message-time">${time}</div>`;
        chatContainer.appendChild(div);
        scrollToBottomIfAtBottom();
    }

    // 为历史记录构建折叠结构的 Assistant 消息
    function addAssistantGroup(contentArray, time) {
        emptyState.style.display = 'none';
        const wrapper = document.createElement('div');
        wrapper.className = 'assistant-message';

        let htmlStr = '';
        contentArray.forEach(block => {
            if (block.type === 'thinking') {
                htmlStr += `<details class="think-details" open><summary>${FOLD_SVG} Thought Process</summary><div class="content">${formatMarkdown(block.thinking)}</div></details>`;
            } else if (block.type === 'text') {
                htmlStr += `<div class="reply-content">${formatMarkdown(block.text)}</div>`;
            } else if (block.type === 'tool_use') {
                htmlStr += `<details class="tool-details" open><summary>${FOLD_SVG} Call: ${escapeHtml(block.name)}</summary><div class="content"><code>${escapeHtml(JSON.stringify(block.input))}</code></div></details>`;
            } else if (block.type === 'tool_result') {
                const status = block.is_error ? 'Error' : 'Result';
                htmlStr += `<details class="tool-details" open><summary>${FOLD_SVG} Tool ${status}</summary><div class="content"><code>${escapeHtml(typeof block.content === 'string' ? block.content : JSON.stringify(block.content))}</code></div></details>`;
            }
        });
        htmlStr += `<div class="message-time">${time}</div>`;
        wrapper.innerHTML = htmlStr;
        chatContainer.appendChild(wrapper);
        scrollToBottomIfAtBottom();
    }

    function setTyping(typing) {
        isTyping = typing;
        sendButton.disabled = typing;
        messageInput.disabled = typing;
        interruptButton.style.display = typing ? 'flex' : 'none';
        sendButton.style.display = typing ? 'none' : 'flex';
    }

    // 统一下游请求结束(或中断)时的状态还原及数据拉取操作
    async function handleStreamEnd() {
        setTyping(false);
        if (currentTargetNode) {
            currentTargetNode.classList.remove('streaming-active');
        }

        if (currentWrapper && !currentWrapper.querySelector('.message-time')) {
            currentWrapper.insertAdjacentHTML('beforeend', `<div class="message-time">${getCurrentTime()}</div>`);
        }

        currentWrapper = null;
        currentTargetNode = null;

        // 重新加载 conversations 列表，这也会更新刚创建好的新对话
        await loadConversationList();

        // 此时如果仍然不知道当前 conversationId（刚新建对话首次发送），则从列表中取最新的一条
        if (!currentConversationId) {
            const firstConversation = document.querySelector('.conversation-item');
            if (firstConversation) {
                currentConversationId = firstConversation.dataset.id;
            }
        }

        // 重新加载当前 conversation 页面内容，确保所有消息已按照服务端记录准确重绘
        if (currentConversationId) {
            await loadConversation(currentConversationId);
        }
    }

    async function interruptConversation() {
        if (!currentEventSource) return;
        // 不再发送 HTTP 请求，直接关闭 SSE
        currentEventSource.close();
        currentEventSource = null;

        // 追加中断错误提示并触发重新加载
        if (currentWrapper && !currentWrapper.querySelector('.reply-content.error-hint')) {
            currentWrapper.insertAdjacentHTML('beforeend', `<div class="reply-content error-hint" style="color: var(--danger-color); font-size: 12px; font-family: var(--font-mono)">[CONNECTION INTERRUPTED BY USER]</div>`);
        }

        await handleStreamEnd();
    }

    async function sendMessage() {
        const message = messageInput.value.trim();
        if (!message || isTyping) return;

        addUserMessage(message, getCurrentTime());
        messageInput.value = '';
        autoResize();
        setTyping(true);

        // 新版流式请求URL支持创建和更新
        let streamUrl = '/agent/stream';
        if (currentConversationId) {
            streamUrl = `/agent/stream/${currentConversationId}`;
        }
        streamUrl += `?query=${encodeURIComponent(message)}&work_dir=${encodeURIComponent(currentWorkdir)}`;

        currentEventSource = new EventSource(streamUrl);

        currentWrapper = null;
        currentTargetNode = null;
        let currentRawText = '';

        currentEventSource.onmessage = (event) => {
            const line = event.data;
            const data = JSON.parse(line);

            // 初始化本次回复的容器
            if (!currentWrapper && data.type !== 'delta') {
                currentWrapper = document.createElement('div');
                currentWrapper.className = 'assistant-message';
                chatContainer.appendChild(currentWrapper);
            }

            if (data.type === 'thinking' || data.type === 'text' || data.type === 'tool_use' || data.type === 'tool_result') {
                if (currentTargetNode) currentTargetNode.classList.remove('streaming-active');
                currentRawText = data.text || '';

                if (data.type === 'thinking') {
                    const details = document.createElement('details');
                    details.className = 'think-details';
                    details.open = true;
                    details.innerHTML = `<summary>${FOLD_SVG} Thought Process</summary><div class="content streaming-active"></div>`;
                    currentWrapper.appendChild(details);
                    currentTargetNode = details.querySelector('.content');
                } else if (data.type === 'text') {
                    const div = document.createElement('div');
                    div.className = 'reply-content streaming-active';
                    currentWrapper.appendChild(div);
                    currentTargetNode = div;
                } else if (data.type === 'tool_use') {
                    const details = document.createElement('details');
                    details.className = 'tool-details';
                    details.open = true;
                    details.innerHTML = `<summary>${FOLD_SVG} Call: ${escapeHtml(data.name || 'Tool')}</summary><div class="content streaming-active"></div>`;
                    currentWrapper.appendChild(details);
                    currentTargetNode = details.querySelector('.content');
                } else if (data.type === 'tool_result') {
                    const details = document.createElement('details');
                    details.className = 'tool-details';
                    details.open = true;
                    const status = data.is_error ? 'Error' : 'Result';
                    details.innerHTML = `<summary>${FOLD_SVG} Tool ${status} [${escapeHtml(String(data.id || ''))}]</summary><div class="content streaming-active"></div>`;
                    currentWrapper.appendChild(details);
                    currentTargetNode = details.querySelector('.content');
                }
                if (currentRawText && currentTargetNode) currentTargetNode.innerHTML = formatMarkdown(currentRawText);
                scrollToBottomIfAtBottom();
            } else if (data.type === 'delta') {
                currentRawText += (data.text || '');
                if (currentTargetNode) currentTargetNode.innerHTML = formatMarkdown(currentRawText);
                scrollToBottomIfAtBottom();
            }
        };

        // EventSource 遇到服务端正常关闭或断开时触发 onerror
        currentEventSource.onerror = async (e) => {
            if (currentEventSource) {
                currentEventSource.close();
                currentEventSource = null;
            }
            await handleStreamEnd();
        };
    }
</script>
</body>
</html>
